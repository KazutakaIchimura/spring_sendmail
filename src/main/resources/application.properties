spring.application.name=spring_sendmail

# Server
server.port=${PORT:8080}

# DataSource (Railway MySQL)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&connectTimeout=10000&socketTimeout=60000
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP: MySQL が起動完了する前に接続に失敗してもアプリを落とさない
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.keepalive-time=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# DB initialization は DatabaseMigrator.java で管理
spring.sql.init.mode=never
